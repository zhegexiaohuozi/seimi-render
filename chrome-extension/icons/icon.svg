<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- seimi-render cookie sync icon: a cookie with a sync arrow -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#g)"/>
  <!-- cookie body -->
  <circle cx="50" cy="54" r="26" fill="#f5d18a" stroke="#c8923f" stroke-width="2"/>
  <!-- chocolate chips -->
  <circle cx="42" cy="46" r="3.5" fill="#4a2c1a"/>
  <circle cx="58" cy="48" r="3" fill="#4a2c1a"/>
  <circle cx="48" cy="60" r="3.2" fill="#4a2c1a"/>
  <circle cx="60" cy="64" r="2.8" fill="#4a2c1a"/>
  <!-- sync arrow (circular) -->
  <path d="M82 70 a18 18 0 1 1 -2 12" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <polygon points="78,66 90,68 84,78" fill="#fff"/>
</svg>
